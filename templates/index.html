<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN Chat</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
  font-family: sans-serif;
  background: #f0f2f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
  margin: 0;
}

    .chat-container {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  height: 90vh;
  overflow: hidden;
  margin: 0 auto;
}

    .chat-header {
  background: #4f46e5;
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  position: relative;
}

    .chat-header .dot {
      width: 10px; height: 10px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chat-header h2 { font-size: 18px; font-weight: 600; }

    .online-pill {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
  position: absolute;
  right: 16px;
  user-select: none;
}
    .online-pill:hover .online-dropdown {
      display: block;
    }

    .online-dropdown {
      display: none;
      position: absolute;
      top: 110%;
      right: 0;
      background: white;
      color: #333;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 160px;
      padding: 8px 0;
      z-index: 100;
    }

    .online-dropdown .dropdown-title {
      font-size: 11px;
      color: #888;
      padding: 4px 14px 6px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .online-dropdown .user-item {
      padding: 6px 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-dropdown .user-item::before {
      content: '';
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .name-bar {
      padding: 10px 16px;
      background: #f8f8ff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
    }

    .name-bar input {
      padding: 5px 10px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      width: 160px;
      transition: border 0.2s;
    }

    .name-bar input:focus { border-color: #4f46e5; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f0f2f5;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-row.system { align-self: center; align-items: center; max-width: 100%; }

    .msg-name {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
      padding: 0 6px;
    }

    .msg-bubble {
      padding: 9px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .me .msg-bubble {
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .other .msg-bubble {
      background: white;
      color: #222;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .system .msg-bubble {
      background: #e5e7eb;
      color: #666;
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
    }

    .msg-time {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 6px;
    }

    .msg-bubble img {
      max-width: 260px;
      border-radius: 10px;
      display: block;
      margin-top: 4px;
    }

    .msg-bubble a { color: inherit; text-decoration: underline; }

    .input-bar {
      padding: 12px 14px;
      border-top: 1px solid #e5e7eb;
      background: white;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    #msg-input:focus { border-color: #4f46e5; }

    .btn-send {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-send:hover { background: #4338ca; }

    .btn-file {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: #666;
      transition: border 0.2s;
      flex-shrink: 0;
    }

    .btn-file:hover { border-color: #4f46e5; color: #4f46e5; }
    #file-input { display: none; }

    @media (max-width: 500px) {
      .chat-container { height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <span class="dot"></span>
    <h2>LAN Chat</h2>
    <div class="online-pill">
      <span id="online-count">1</span> online
      <div class="online-dropdown">
        <div class="dropdown-title">Online now</div>
        <div id="online-names-list"></div>
      </div>
    </div>
  </div>

  <div class="name-bar">
    👤 Your name:
    <input id="username" type="text" value="User" maxlength="20"
           placeholder="Enter name"
           onchange="updateUsername()"
           onblur="updateUsername()">
  </div>

  <div id="messages"></div>

  <div class="input-bar">
    <button class="btn-file" onclick="document.getElementById('file-input').click()" title="Send file">📎</button>
    <input type="file" id="file-input" onchange="uploadFile()">
    <input id="msg-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="btn-send" onclick="sendMsg()" title="Send">➤</button>
  </div>

</div>

<script>
  // ── 1. Initialize socket FIRST ──
  const socket = io({
    transports: ['websocket', 'polling']
  });

  // ── 2. Helper functions ──
  function getUsername() {
    return document.getElementById('username').value.trim() || 'Anonymous';
  }

  function updateUsername() {
    socket.emit('set_username', { username: getUsername() });
  }

  // ── 3. Send message ──
  function sendMsg() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    const username = getUsername();
    if (!username || username === 'Anonymous') {
      alert('Please enter your name first!');
      document.getElementById('username').focus();
      return;
    }
    socket.emit('send_message', { username: username, message: msg });
    input.value = '';
  }

  // ── 4. Upload file ──
  function uploadFile() {
    const file = document.getElementById('file-input').files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('username', getUsername());
    fetch('/upload', { method: 'POST', body: fd })
      .then(() => { document.getElementById('file-input').value = ''; });
  }

  // ── 5. Connection events ──
  socket.on('connect', () => {
    document.getElementById('connection-banner').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'none';
    updateUsername();
  });

  socket.on('disconnect', () => {
    document.getElementById('connection-banner').style.display = 'block';
  });

  socket.on('connect_error', () => {
    document.getElementById('connection-banner').style.display = 'block';
  });

  // ── 6. Online users ──
  socket.on('online_update', data => {
    document.getElementById('online-count').textContent = data.count;
    const list = document.getElementById('online-names-list');
    list.innerHTML = data.names
      .map(name => `<div class="user-item">${name}</div>`)
      .join('');
  });

  // ── 7. Receive message ──
  socket.on('receive_message', data => {
    const myName = getUsername();
    const div = document.getElementById('messages');

    let rowClass = 'other';
    if (data.username === 'System') rowClass = 'system';
    else if (data.username === myName) rowClass = 'me';

    const timeStr = data.time ? `<div class="msg-time">${data.time}</div>` : '';
    const nameStr = rowClass === 'other' ? `<div class="msg-name">${data.username}</div>` : '';

    div.innerHTML += `
      <div class="msg-row ${rowClass}">
        ${nameStr}
        <div class="msg-bubble">${data.message}</div>
        ${timeStr}
      </div>`;

    div.scrollTop = div.scrollHeight;
  });

  // ── 8. File shared ──
  socket.on('file_shared', data => {
    const myName = getUsername();
    const isImage = /\.(png|jpg|jpeg|gif|webp)$/i.test(data.filename);
    const isVideo = /\.(mp4|mkv|avi|mov)$/i.test(data.filename);

    let content = '';
    if (isImage) {
      content = `<img src="${data.url}" alt="${data.filename}">`;
    } else if (isVideo) {
      content = `<video src="${data.url}" controls style="max-width:260px;border-radius:10px;display:block;margin-top:4px"></video>`;
    } else {
      content = `📎 <a href="${data.url}" target="_blank">${data.filename}</a>`;
    }

    const type = data.username === myName ? 'me' : 'other';
    const div = document.getElementById('messages');
    const nameStr = type === 'other' ? `<div class="msg-name">${data.username}</div>` : '';
    const timeStr = data.time ? `<div class="msg-time">${data.time}</div>` : '';

    div.innerHTML += `
      <div class="msg-row ${type}">
        ${nameStr}
        <div class="msg-bubble">${content}</div>
        ${timeStr}
      </div>`;
    div.scrollTop = div.scrollHeight;
  });
</script>

</body>
</html>
